name: Plugin CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        plugin: [jira-integration, db-migration-checker, changelog-generator]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        working-directory: plugins/${{ matrix.plugin }}
        run: npm ci
      
      - name: Lint
        working-directory: plugins/${{ matrix.plugin }}
        run: npm run lint
      
      - name: Build
        working-directory: plugins/${{ matrix.plugin }}
        run: npm run build
      
      - name: Test
        working-directory: plugins/${{ matrix.plugin }}
        run: npm run test

  integration-test:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Test plugins in sample project
        working-directory: test-project
        run: |
          npm install
          npm run test
